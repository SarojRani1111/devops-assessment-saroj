apiVersion: batch/v1
kind: CronJob
metadata:
  name: api-health-check
  namespace: app
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: api-health-check
              image: curlimages/curl:latest
              command:
                - /bin/sh
                - -c
                - |
                  echo "Running health check at $(date)"
                  curl -f http://backend:3001/health
                  echo "Health check completed"