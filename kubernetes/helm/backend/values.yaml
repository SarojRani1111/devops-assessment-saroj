replicaCount: 2

image:
  repository: your-account-id.dkr.ecr.us-east-1.amazonaws.com/backend
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 3001
  targetPort: 3001

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

env:
  PORT: "3001"
  NODE_ENV: "production"
  LOG_LEVEL: "info"

secret:
  APP_SECRET: "Y2xvdWRtYXZlbi1zZWNyZXQta2V5"

cronjob:
  schedule: "*/5 * * * *"
  image: curlimages/curl:latest

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}